name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - fix/**
  schedule:
    - cron: "0 3 * * 1"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lint dependencies
        run: python -m pip install --upgrade pip ruff

      - name: Ruff
        run: ruff check gh-address-cr tests

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: Shell syntax
        run: |
          shopt -s nullglob
          sh_files=(gh-address-cr/scripts/*.sh)
          if (( ${#sh_files[@]} > 0 )); then
            bash -n "${sh_files[@]}"
          fi

      - name: CLI smoke
        run: |
          python gh-address-cr/scripts/cli.py --help
          python gh-address-cr/scripts/cli.py cr-loop --help
